<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Results — CyberSafer</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header class="header">
    <a href="/" class="header__logo">🛡️ <span>Cyber</span>Safer</a>
  </header>

  <div class="results-page" id="results-page">
    <div class="results-header">
      <div id="pass-icon" style="font-size:2.5rem; margin-bottom:1rem;"></div>
      <h1 id="results-title" style="font-size:1.5rem; font-weight:700; margin-bottom:0.5rem;"></h1>
      <p id="scenario-title" class="text-muted" style="font-size:0.9375rem;"></p>
    </div>

    <!-- Score ring -->
    <div class="score-ring results-score">
      <svg width="120" height="120" viewBox="0 0 120 120">
        <circle cx="60" cy="60" r="50" fill="none" stroke="var(--border)" stroke-width="8"/>
        <circle cx="60" cy="60" r="50" fill="none"
          id="score-circle"
          stroke="var(--green)"
          stroke-width="8"
          stroke-linecap="round"
          stroke-dasharray="314"
          stroke-dashoffset="314"
          style="transition: stroke-dashoffset 1s ease, stroke 0.3s ease;"
        />
      </svg>
      <div class="score-ring__label" id="score-label">0</div>
      <div class="score-ring__sublabel">out of 100</div>
    </div>

    <!-- Flags found/missed -->
    <div class="results-flags">
      <div class="results-flags__title">Red Flags</div>
      <div class="results-flags__list" id="flags-list"></div>
    </div>

    <div class="divider"></div>

    <!-- Learning objectives -->
    <div id="learning-section" style="display:none; margin-bottom:1.5rem;">
      <div class="results-flags__title" style="margin-bottom:0.75rem;">What to remember</div>
      <ul class="learning-list" id="learning-list"></ul>
    </div>

    <!-- Debrief -->
    <div class="debrief-box" id="debrief-box"></div>

    <!-- Resources (for grooming) -->
    <div class="resources-box" id="resources-box" style="display:none;">
      <div class="resources-box__title">🆘 If you need help</div>
      <div id="resources-list"></div>
    </div>

    <!-- Actions -->
    <div style="display:flex; gap:0.875rem; flex-wrap:wrap;">
      <a href="scenarios.html" class="btn btn--primary">More Scenarios</a>
      <button class="btn btn--secondary" id="retry-btn" onclick="retryScenario()">Try Again</button>
    </div>
  </div>

  <script>
    function formatFlag(key) {
      return key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    }

    function renderDebrief(text) {
      // Basic markdown: **bold** and newlines to <p>
      const escaped = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      const bolded = escaped.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      const paragraphed = bolded.split('\n\n').map(p => `<p>${p.replace(/\n/g,'<br>')}</p>`).join('');
      return paragraphed;
    }

    function init() {
      const raw = sessionStorage.getItem('cs_results');
      const title = sessionStorage.getItem('cs_scenario_title') || 'Scenario';

      if (!raw) {
        document.getElementById('results-page').innerHTML = `
          <p class="text-muted">No results to show. <a href="scenarios.html">Choose a scenario</a> to get started.</p>
        `;
        return;
      }

      const r = JSON.parse(raw);
      const score = r.score || 0;
      const passed = r.passed;

      // Title + icon
      document.getElementById('pass-icon').textContent = passed ? '🏆' : '📚';
      document.getElementById('results-title').textContent = passed ? 'Well done!' : 'Good effort!';
      document.getElementById('scenario-title').textContent = title;

      // Score ring animation
      const circle = document.getElementById('score-circle');
      const label  = document.getElementById('score-label');
      const circumference = 314;

      // Colour based on score
      if (score >= 70) circle.style.stroke = 'var(--green)';
      else if (score >= 40) circle.style.stroke = 'var(--amber)';
      else circle.style.stroke = 'var(--red)';

      setTimeout(() => {
        const offset = circumference - (score / 100) * circumference;
        circle.style.strokeDashoffset = offset;
        // Animate counter
        let current = 0;
        const step = score / 40;
        const interval = setInterval(() => {
          current = Math.min(current + step, score);
          label.textContent = Math.round(current);
          if (current >= score) clearInterval(interval);
        }, 25);
      }, 200);

      // Flags
      const flagsList = document.getElementById('flags-list');
      const allRequired = r.success_criteria_total || [];
      const found = r.red_flags_detected || [];
      const allFlags = [...new Set([...allRequired, ...found])];

      allFlags.forEach(f => {
        const item = document.createElement('span');
        const wasCriteria = allRequired.includes(f);
        const wasFound = found.includes(f);
        item.className = `flag-item ${wasFound ? 'flag-item--found' : 'flag-item--missed'}`;
        item.textContent = `${wasFound ? '✓' : '○'} ${formatFlag(f)}`;
        flagsList.appendChild(item);
      });

      // Learning objectives
      if (r.learning_objectives && r.learning_objectives.length) {
        document.getElementById('learning-section').style.display = 'block';
        const list = document.getElementById('learning-list');
        r.learning_objectives.forEach(obj => {
          const li = document.createElement('li');
          li.textContent = obj;
          list.appendChild(li);
        });
      }

      // Debrief
      const debrief = document.getElementById('debrief-box');
      debrief.innerHTML = renderDebrief(r.feedback || 'Well done completing this scenario!');

      // Resources (if present in results)
      if (r.resources && r.resources.length) {
        document.getElementById('resources-box').style.display = 'block';
        const list = document.getElementById('resources-list');
        r.resources.forEach(res => {
          const a = document.createElement('a');
          a.className = 'resource-link';
          a.href = res.url;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          a.innerHTML = `🔗 ${res.name}${res.phone ? ' · ' + res.phone : ''}`;
          list.appendChild(a);
        });
      }

      // Store scenario ID for retry
      document.getElementById('retry-btn').dataset.scenario =
        sessionStorage.getItem('cs_scenario_id') || '';
    }

    function retryScenario() {
      // Clear results, restart same scenario
      const scenario = sessionStorage.getItem('cs_scenario_id');
      sessionStorage.removeItem('cs_results');
      if (scenario) {
        window.location.href = `chat.html?scenario=${encodeURIComponent(scenario)}`;
      } else {
        window.location.href = 'scenarios.html';
      }
    }

    init();
  </script>
</body>
</html>
