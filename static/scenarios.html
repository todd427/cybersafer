<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex,nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Training — CyberSafer</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .cat-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.875rem;
    }
    .cat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem 1.25rem 1.25rem 1rem;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      gap: 1rem;
      position: relative;
      overflow: hidden;
    }
    .cat-card:hover { border-color: var(--blue); transform: translateY(-1px); }
    .cat-card:active { transform: translateY(0); }
    .cat-card__icon {
      font-size: 2rem;
      flex-shrink: 0;
      width: 3rem;
      text-align: center;
    }
    .cat-card__body { flex: 1; min-width: 0; }
    .cat-card__title { font-weight: 700; font-size: 1rem; margin-bottom: 0.25rem; }
    .cat-card__desc { font-size: 0.8375rem; color: var(--text-muted); line-height: 1.45; }
    .cat-card__meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
      flex-wrap: wrap;
    }
    .cat-card__arrow {
      color: var(--text-subtle);
      font-size: 1.1rem;
      flex-shrink: 0;
      transition: transform 0.15s ease, color 0.15s ease;
    }
    .cat-card:hover .cat-card__arrow { transform: translateX(3px); color: var(--blue); }
    .progress-dots {
      display: flex;
      gap: 3px;
      align-items: center;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.2s;
    }
    .dot--done { background: var(--green); }
    @media (min-width: 560px) {
      .cat-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (min-width: 900px) {
      .cat-grid { grid-template-columns: 1fr 1fr 1fr; }
    }
  </style>
</head>
<body>
  <script>
    // Onboarding gate — redirect if not accepted this session
    try {
      const _ob = JSON.parse(sessionStorage.getItem('cs_onboarded') || 'null');
      if (!_ob || !_ob.accepted) window.location.replace('onboarding.html');
    } catch(e) {
      window.location.replace('onboarding.html');
    }
  </script>
  <header class="header">
    <a href="/" class="header__logo">🛡️ <span>Cyber</span>Safer</a>
    <nav class="header__nav">
      <a href="scenarios.html" style="color:var(--text);">Training</a>
    </nav>
  </header>

  <div class="container page">
    <h1 class="page__title">Training Scenarios</h1>
    <p class="page__subtitle">Choose a threat category to begin. Each category has a Recognise level and a Respond level.</p>
    <div class="cat-grid" id="cat-grid">
      <p class="text-muted">Loading...</p>
    </div>
  </div>

  <script>
    const CATEGORIES = {
      phishing:      { icon:'🎣', label:'Phishing',       desc:'Fake emails and messages designed to steal your information or trick you into clicking malicious links.' },
      online_scams:  { icon:'💸', label:'Scams',          desc:'Too-good-to-be-true investment offers, fake jobs, and financial fraud.' },
      malware:       { icon:'🦠', label:'Malware',        desc:'Malicious software and fake tech support scams that try to compromise your device.' },
      identity_theft:{ icon:'🪪', label:'Identity Theft', desc:'Attempts to harvest your personal information and take over your accounts.' },
      cyberbullying: { icon:'😤', label:'Cyberbullying',  desc:'Online harassment, threats, and social manipulation in group chats and on social media.' },
      grooming:      { icon:'⚠️', label:'Online Safety',  desc:'Manipulation and grooming tactics used by adults targeting young people online.' },
    };

    async function load() {
      const grid = document.getElementById('cat-grid');
      try {
        const res = await fetch('scenarios-index.json');
        const data = await res.json();
        const cats = data.categories || {};
        const completed = JSON.parse(localStorage.getItem('cs_completed') || '[]');

        const order = ['phishing','online_scams','malware','identity_theft','cyberbullying','grooming'];
        const sorted = order.filter(k => cats[k]).concat(Object.keys(cats).filter(k => !order.includes(k)));

        grid.innerHTML = sorted.map(key => {
          const meta = CATEGORIES[key] || { icon:'🔐', label: key, desc:'' };
          const scenarios = cats[key] || [];
          const total = scenarios.length;
          const done = scenarios.filter(s => completed.includes(s.id)).length;
          const dots = scenarios.map(s => `<div class="dot ${completed.includes(s.id) ? 'dot--done' : ''}"></div>`).join('');

          return `
            <div class="cat-card" onclick="location.href='category.html?cat=${encodeURIComponent(key)}'">
              <div class="cat-card__icon">${meta.icon}</div>
              <div class="cat-card__body">
                <div class="cat-card__title">${meta.label}</div>
                <div class="cat-card__desc">${meta.desc}</div>
                <div class="cat-card__meta">
                  <span class="badge badge--subtle">${total} scenario${total !== 1 ? 's' : ''}</span>
                  ${done > 0 ? `<span class="badge badge--green">${done} done</span>` : ''}
                  <div class="progress-dots">${dots}</div>
                </div>
              </div>
              <div class="cat-card__arrow">›</div>
            </div>
          `;
        }).join('');
      } catch(e) {
        grid.innerHTML = `<p style="color:var(--red);">Could not load scenarios: ${e.message}</p>`;
      }
    }

    load();
  </script>
</body>
</html>
