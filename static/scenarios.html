<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scenarios — CyberSafer</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header class="header">
    <a href="/" class="header__logo">🛡️ <span>Cyber</span>Safer</a>
    <nav class="header__nav">
      <a href="scenarios.html" style="color: var(--text);">Scenarios</a>
      <a href="freeplay.html">Free Play</a>
    </nav>
  </header>

  <div class="container page">
    <h1 class="page__title">Training Scenarios</h1>
    <p class="page__subtitle">Choose a scenario to practise. Each one simulates a real threat.</p>

    <div class="tabs" id="tabs"></div>
    <div class="scenario-grid" id="grid"></div>
  </div>

  <!-- Content warning modal -->
  <div class="modal-overlay" id="warning-modal" style="display:none;">
    <div class="modal">
      <div class="modal__icon">⚠️</div>
      <h2 class="modal__title" id="warning-title">Content Warning</h2>
      <div class="modal__body" id="warning-body"></div>
      <div class="modal__actions">
        <button class="btn btn--primary" id="warning-proceed">I understand — continue</button>
        <button class="btn btn--ghost" id="warning-cancel">Go back</button>
      </div>
    </div>
  </div>

  <script>
    const CATEGORY_ICONS = {
      phishing:     '🎣',
      scam:         '💸',
      malware:      '🦠',
      identity:     '🪪',
      cyberbullying:'😤',
      grooming:     '⚠️',
      other:        '🔐',
    };
    const CATEGORY_LABELS = {
      phishing:     'Phishing',
      scam:         'Scams',
      malware:      'Malware',
      identity:     'Identity Theft',
      cyberbullying:'Cyberbullying',
      grooming:     'Online Safety',
      other:        'Other',
    };
    const DIFFICULTY_BADGE = {
      beginner:     ['badge--green', 'Beginner'],
      intermediate: ['badge--amber', 'Intermediate'],
      advanced:     ['badge--red', 'Advanced'],
    };

    let allCategories = {};
    let activeCategory = 'all';
    let pendingScenario = null;

    // Completed scenarios from localStorage
    function getCompleted() {
      try { return JSON.parse(localStorage.getItem('cs_completed') || '[]'); }
      catch { return []; }
    }

    async function loadScenarios() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '<p class="text-muted" style="padding:1rem 0;">Loading...</p>';
      try {
        const res = await fetch('/api/scenarios');
        const data = await res.json();
        allCategories = data.categories || {};
        buildTabs();
        renderGrid('all');
      } catch(e) {
        grid.innerHTML = '<p style="color:var(--red);">Could not load scenarios. Is the server running?</p>';
      }
    }

    function buildTabs() {
      const tabs = document.getElementById('tabs');
      const cats = Object.keys(allCategories);
      const total = cats.reduce((s, c) => s + allCategories[c].length, 0);

      tabs.innerHTML = `
        <button class="tab tab--active" data-cat="all" onclick="renderGrid('all', this)">
          All <span style="opacity:0.6;margin-left:0.3rem;">${total}</span>
        </button>
        ${cats.map(c => `
          <button class="tab" data-cat="${c}" onclick="renderGrid('${c}', this)">
            ${CATEGORY_ICONS[c] || '🔐'} ${CATEGORY_LABELS[c] || c}
            <span style="opacity:0.6;margin-left:0.3rem;">${allCategories[c].length}</span>
          </button>
        `).join('')}
      `;
    }

    function renderGrid(cat, tabEl) {
      activeCategory = cat;

      // Update tab styles
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('tab--active'));
      if (tabEl) tabEl.classList.add('tab--active');

      const completed = getCompleted();
      const grid = document.getElementById('grid');

      let scenarios = [];
      if (cat === 'all') {
        Object.values(allCategories).forEach(arr => scenarios.push(...arr));
      } else {
        scenarios = allCategories[cat] || [];
      }

      if (!scenarios.length) {
        grid.innerHTML = '<p class="text-muted">No scenarios in this category yet.</p>';
        return;
      }

      grid.innerHTML = scenarios.map(s => {
        const [diffClass, diffLabel] = DIFFICULTY_BADGE[s.difficulty] || ['badge--subtle', s.difficulty];
        const catKey = Object.keys(allCategories).find(k => allCategories[k].some(x => x.id === s.id));
        const icon = CATEGORY_ICONS[catKey] || '🔐';
        const isDone = completed.includes(s.id);
        const isGrooming = catKey === 'grooming';
        return `
          <div class="scenario-card" onclick="selectScenario('${s.id}', ${isGrooming})">
            ${isDone ? '<div class="scenario-card__done">✓</div>' : ''}
            <div class="scenario-card__header">
              <div>
                <div style="font-size:1.25rem; margin-bottom:0.4rem;">${icon}</div>
                <div class="scenario-card__title">${s.title}</div>
              </div>
            </div>
            <div class="scenario-card__desc">${s.description}</div>
            <div class="scenario-card__meta">
              <span class="badge ${diffClass}">${diffLabel}</span>
              <span class="badge badge--subtle">~${s.estimated_minutes || 5} min</span>
              ${isGrooming ? '<span class="badge badge--amber">⚠️ Content warning</span>' : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    async function selectScenario(scenarioId, hasWarning) {
      if (hasWarning) {
        // Fetch scenario details for warning text
        try {
          const res = await fetch(`/api/scenario/${scenarioId}`);
          const s = await res.json();
          showWarning(s, scenarioId);
        } catch {
          showWarning(null, scenarioId);
        }
      } else {
        launchScenario(scenarioId);
      }
    }

    function showWarning(scenario, scenarioId) {
      pendingScenario = scenarioId;
      const modal = document.getElementById('warning-modal');
      const title = document.getElementById('warning-title');
      const body = document.getElementById('warning-body');

      title.textContent = scenario?.title ? `Content Warning — ${scenario.title}` : 'Content Warning';
      body.textContent = scenario?.content_warning_text ||
        'This scenario deals with a sensitive topic. It is educational and appropriate for general audiences, but please be aware of the subject matter before continuing.';

      modal.style.display = 'flex';
    }

    document.getElementById('warning-proceed').onclick = () => {
      document.getElementById('warning-modal').style.display = 'none';
      if (pendingScenario) launchScenario(pendingScenario);
    };
    document.getElementById('warning-cancel').onclick = () => {
      document.getElementById('warning-modal').style.display = 'none';
      pendingScenario = null;
    };
    document.getElementById('warning-modal').onclick = (e) => {
      if (e.target === e.currentTarget) {
        e.currentTarget.style.display = 'none';
        pendingScenario = null;
      }
    };

    function launchScenario(scenarioId) {
      window.location.href = `chat.html?scenario=${encodeURIComponent(scenarioId)}`;
    }

    loadScenarios();
  </script>
</body>
</html>
